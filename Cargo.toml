[package]
name = "saba"
version = "0.1.0"
edition = "2021"
description = "Saba Bandwidth Allocation Scheme"
repository = "https://github.com/mrkatebzadeh/saba-controller"
license = "MIT"

[[bin]]
name = "controller"
path = "src/controller/main.rs"

[[bin]]
name = "connection_manager"
path = "src/connection_manager/main.rs"


[dependencies]
toml = "0.5.11"
clap = { version = "4.1.1", features = ["derive"] }
serde = { version = "1.0.152", features = ["derive"] }
tonic = { version = "0.8.3", features = ["tls"] }
prost = "0.11.6"
tokio = { version = "1.24.2", features = ["full"] }
log = "0.4.17"
simplelog = "0.12.0"
csv = "1.1"


[build-dependencies]
tonic-build = "0.8.3"
